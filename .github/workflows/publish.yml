name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          # NOTE: do NOT set registry-url here. It makes setup-node write an
          # .npmrc with an (empty) _authToken, which suppresses the OIDC
          # handshake and causes a 404 on publish. npm defaults to the public
          # registry, and Trusted Publishing supplies auth via OIDC.
      # Trusted Publishing needs npm >= 11.5.1; the runner ships an older npm.
      - run: npm install -g npm@latest
      - run: npm ci || npm install
      # No NODE_AUTH_TOKEN: OIDC exchanges a short-lived token automatically,
      # and provenance is attached by default.
      - run: npm publish
